<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheWorldEmpire Industries | Official Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { background-color: #000000; color: #ffffff; font-family: 'Courier New', Courier, monospace; overflow: hidden; width: 100%; height: 100%; }
        .global-border { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 4px solid #ffffff; pointer-events: none; z-index: 9999; }
        .corner-motif { position: absolute; width: 30px; height: 30px; border: 4px solid #ffffff; }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .top-right { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .slide-container { position: relative; width: 100%; height: 100%; display: flex; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); z-index: 5; }
        .slide { min-width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; position: relative; overflow: hidden; }
        .main-title { font-family: 'Georgia', serif; font-style: italic; font-size: 5.5rem; letter-spacing: 4px; text-align: center; margin-top: 20px; text-shadow: 0 0 25px rgba(255,255,255,0.4); }
        .sub-title { font-size: 1.1rem; letter-spacing: 6px; text-transform: uppercase; margin-top: 15px; color: #aaaaaa; text-align: center; }
        .trident-svg { width: 160px; height: 200px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.7)); }
        .board-wrapper { display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 1200px; gap: 50px; }
        .leader-node { width: 260px; border: 3px solid #ffffff; padding: 20px; text-align: center; background: rgba(0,0,0,0.85); position: relative; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .board-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; }
        .board-card { border: 2px solid #ffffff; padding: 15px; text-align: center; background: rgba(0,0,0,0.9); }
        .profile-placeholder { width: 100%; height: 150px; border: 1px dashed #ffffff; display: flex; justify-content: center; align-items: center; font-size: 4rem; font-weight: bold; background: #0a0a0a; margin-bottom: 15px; color: #ffffff; }
        .blueprint-container { display: grid; grid-template-columns: 1.2fr 1fr; width: 85%; height: 70%; border: 2px solid #ffffff; background: rgba(5,5,5,0.95); }
        .marshal-frame { border-right: 2px solid #ffffff; padding: 40px; display: flex; justify-content: center; align-items: center; background: #050505; }
        .faceless-marshal-svg { width: 220px; height: 320px; }
    </style>
</head>
<body>
    <div class="global-border"><div class="corner-motif top-left"></div><div class="corner-motif top-right"></div><div class="corner-motif bottom-left"></div><div class="corner-motif bottom-right"></div></div>
    <canvas id="canvas-matrix"></canvas>
    <div class="slide-container" id="main-slider">
        <div class="slide">
            <svg class="trident-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <path d="M 25 90 L 25 40 L 30 35 L 35 40 L 35 80 Z" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>
                <path d="M 75 90 L 75 40 L 70 35 L 65 40 L 65 80 Z" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>
                <path d="M 25 90 L 50 115 L 75 90 L 65 80 L 50 95 L 35 80 Z" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round"/>
                <path d="M 50 15 L 60 38 L 54 38 L 54 55 L 46 55 L 46 38 L 40 38 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1.5"/>
            </svg>
            <h1 class="main-title">TheWorldEmpire</h1>
        </div>
        <div class="slide">
            <div class="board-wrapper">
                <div class="leader-node"><div class="profile-placeholder">?</div>TheWorldEmperor</div>
                <div class="board-grid">
                    <div class="board-card"><div class="profile-placeholder">?</div>Golden</div>
                    <div class="board-card"><div class="profile-placeholder">?</div>Prof. Dr. Muhammed Atmaca</div>
                    <div class="board-card"><div class="profile-placeholder">?</div>FlameLord</div>
                    <div class="board-card"><div class="profile-placeholder">?</div>ST3MRSTY</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('canvas-matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        // Basit bir döngü ekleyebilirsin
    </script>
</body>
</html>
